<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PodWash">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
    <title>PodWash Playback Spike</title>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">PodWash PWA spike</p>
          <h1>Playback viability test</h1>
        </div>
        <span id="networkStatus" class="status-pill">Checking</span>
      </header>

      <section class="episode">
        <div class="episode-art" aria-hidden="true">PW</div>
        <div class="episode-copy">
          <p class="episode-number">This American Life 890</p>
          <h2>Maximal Americanness</h2>
          <p>July 3, 2026</p>
        </div>
      </section>

      <audio
        id="player"
        controls
        preload="metadata"
        crossorigin="anonymous"
        src="/audio/episode.mp3"
      ></audio>

      <section class="controls" aria-label="Episode download controls">
        <button id="downloadButton" type="button">Download</button>
        <button id="removeButton" type="button" class="secondary">Remove</button>
        <p id="downloadState" class="state-text">Checking download state.</p>
      </section>

      <section class="metrics" aria-label="Storage and persistence">
        <div>
          <span>Storage</span>
          <strong id="storageEstimate">Calculating</strong>
        </div>
        <div>
          <span>Persistence</span>
          <strong id="persistState">Checking</strong>
        </div>
      </section>

      <section class="checklist" aria-label="Manual test checklist">
        <label>
          <input type="checkbox" data-check="reopen">
          close/reopen survived
        </label>
        <label>
          <input type="checkbox" data-check="airplane">
          airplane mode playback worked
        </label>
        <label>
          <input type="checkbox" data-check="locked">
          locked playback continued
        </label>
        <label>
          <input type="checkbox" data-check="controls">
          lock-screen/Bluetooth controls acceptable
        </label>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
