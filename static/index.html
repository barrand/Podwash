<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PodWash Lab</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>PodWash Lab</h1>
        <p>Preprocess a seeded clip, then listen to the cleaned output.</p>
      </header>

      <section class="layout">
        <nav class="episode-list" aria-label="Seeded clips">
          <div class="panel-title">Seeded clips</div>
          <div id="episodes"></div>
        </nav>

        <section class="workspace" aria-live="polite">
          <div id="empty-state" class="empty">Select a clip to inspect preprocessing.</div>
          <article id="details" class="details hidden">
            <div class="details-head">
              <div>
                <div id="show" class="show"></div>
                <h2 id="title"></h2>
              </div>
              <span id="state-pill" class="state-pill">Idle</span>
            </div>

            <dl class="metadata">
              <div><dt>Source</dt><dd id="source-type"></dd></div>
              <div><dt>Clip start</dt><dd id="clip-start"></dd></div>
              <div><dt>Clip length</dt><dd id="clip-length"></dd></div>
              <div><dt>Profile</dt><dd id="target-profile"></dd></div>
              <div><dt>Mode</dt><dd id="process-mode"></dd></div>
            </dl>

            <div class="actions">
              <button id="process-btn" type="button">Process</button>
              <button id="reprocess-btn" type="button" class="secondary">Reprocess</button>
            </div>

            <ol class="stages" id="stages">
              <li data-stage="Idle">Idle</li>
              <li data-stage="Clipping">Clipping</li>
              <li data-stage="Transcribing">Transcribing</li>
              <li data-stage="Censoring">Censoring</li>
              <li data-stage="Ready">Ready</li>
              <li data-stage="Failed">Failed</li>
            </ol>

            <p id="message" class="message"></p>
            <p id="warning" class="warning hidden"></p>

            <div class="metrics">
              <div><span id="match-count">-</span><small>matches</small></div>
              <div><span id="interval-count">-</span><small>intervals</small></div>
            </div>

            <div id="player-block" class="player-block hidden">
              <audio id="audio-player" controls preload="metadata"></audio>
              <a id="report-link" href="#" target="_blank" rel="noreferrer">Open report JSON</a>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
